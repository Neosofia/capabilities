name: service-build-push

on:
  push:
    tags:
      - 'capabilities/*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    uses: Neosofia/platform-workflows/.github/workflows/_test-python.yml@main

  scan:
    name: Vulnerability Scan
    uses: Neosofia/platform-workflows/.github/workflows/_scan.yml@main

  build-push:
    name: Build & Push to GHCR
    needs: [test, scan]
    uses: Neosofia/platform-workflows/.github/workflows/_build-push.yml@main
    with:
      image_name: ghcr.io/${{ github.repository_owner }}/capabilities
      tag_prefix: capabilities
      cache_scope: capabilities

  deploy-railway:
    name: Deploy to Railway
    needs: build-push
    if: ${{ secrets.RAILWAY_TOKEN != '' && vars.RAILWAY_SERVICE_ID != '' }}
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Redeploy service
        run: railway redeploy -y --service "${{ vars.RAILWAY_SERVICE_ID }}"
